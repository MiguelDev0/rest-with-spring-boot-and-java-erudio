cors:
  originPatterns: "http://localhost:8080,http://localhost:8888,https://erudio.com.br,https://www.erudio.com.br"
server:
  port: 8888
spring:
  application:
    name: rest-with-spring-boot-and-java-erudio
  datasource:
    url: "jdbc:mysql://localhost:3306/erudio_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
    show-sql: false
    open-in-view: false
logging:
  level:
    root: INFO
    # root: WARN
    # br.com.erudio: DEBUG
spring-doc:
  paths-to-match: /api/**/v1/**
  swagger-ui:
    use-root-path: true