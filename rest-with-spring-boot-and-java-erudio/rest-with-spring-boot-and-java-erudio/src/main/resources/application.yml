cors:
  originPatterns: "http://localhost:8080, https://erudio.com.br"
spring:
  port: 8888
  application: null
  name: rest-with-spring-boot-and-java-erudio
  datasource:
    url: "jdbc:mysql://localhost:3306/erudio_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
    username: erudio_user
    password: erudio_pass
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
    open-in-view: false
logging:
  level:
    br.com.erudio: DEBUG
spring-doc:
  paths-to-match: /api/**/v1/**